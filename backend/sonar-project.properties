# SonarQube / SonarCloud configuration for Flight Status Simulator (backend)
# See: https://docs.sonarsource.com/product/analysis/analysis-parameters/

# Project identification (change projectKey if using SonarCloud to match your key)
sonar.projectKey=flight-status-simulator-backend
sonar.projectName=Flight Status Simulator - Backend
sonar.projectVersion=1.0.0
sonar.python.version=3.9,3.10,3.11
sonar.organization=konstrictorman
sonar.projectKey=Konstrictorman_flight_status_simulator

# Source and test directories (relative to this file)
sonar.sources=app
sonar.tests=tests

# Python
sonar.python.version=3.12

# Test coverage: path to the XML report generated by pytest-cov
# Generate with: pytest --cov=app --cov-report=xml
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions (optional)
sonar.exclusions=**/__pycache__/**,**/tests/**,**/.venv/**

# Encoding
sonar.sourceEncoding=UTF-8
